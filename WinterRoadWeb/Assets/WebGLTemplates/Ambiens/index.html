<!DOCTYPE html>
<html lang="en-us">
   <head>
      <meta charset="utf-8" />
      <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
      <title>{{{ PRODUCT_NAME }}}</title>
      <link rel="icon" type="image/png" href="favicon.png">
      <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"/>


      <link rel="stylesheet" href="Template/style.css" />
      
   </head>
   <body class="{{{SPLASH_SCREEN_STYLE}}}">
      <!-- Ambiens VR Multiplatform WebGL Template v 1.3-->
      <!-- Unity Container -->
      <div id="main-container" class="fill-window">

         <div id="unity-container">
            <canvas id="unity-canvas"></canvas>
            <!-- Fullscreen toggle button (hidden) -->
            <!-- <div id="toggle_fullscreen" class="button floatbottomLeft fullscreenON" > <span class="imgbutton"></span> </div> -->
         </div>

         <!-- This is a simple progress bar -->
         <div id="loader" class="loader">
            <!-- 전체화면 타이틀 이미지 (비율 유지하면서 최대한 크게, 여백은 검은색) -->
            <img src="Template/title.png" class="fullscreen-title" />
            
            <div class="container progress-container">
               <div class="center">   
                  <div class="progressbar">
                     <div id="fill" class="fill" style="width: 0%;"></div>
                  </div>
               </div>
            </div>
            
            
            <div class="footer-cont">
               <p>{{{ PRODUCT_NAME }}} v. {{{ PRODUCT_VERSION }}}</p>
               <p>{{{ COMPANY_NAME }}}</p>
            </div>

         </div>
         
      </div>

      <!-- iOS 전용 스크린샷 저장 링크 (Unity C#에서 PrepareScreenshotURL_iOS 호출 시 활성화) -->
      <a id="ios-screenshot-save-link"
         href=""
         target="_blank"
         rel="noopener"
         style="display:none;
                position:fixed;
                bottom:24px;
                left:50%;
                transform:translateX(-50%);
                z-index:9999;
                padding:14px 32px;
                background:rgba(255,255,255,0.95);
                color:#000;
                text-decoration:none;
                border-radius:999px;
                font-family:-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
                font-size:16px;
                font-weight:700;
                box-shadow:0 4px 16px rgba(0,0,0,0.25);
                align-items:center;
                justify-content:center;
                gap:8px;
                -webkit-tap-highlight-color:transparent;">
         <span style="font-size:20px;">📸</span>
         <span>이미지 저장</span>
      </a>

      <script src="Template/app.js"> </script>

   </body>
</html>
