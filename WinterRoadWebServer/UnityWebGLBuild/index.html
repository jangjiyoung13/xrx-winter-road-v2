<!DOCTYPE html>
<html lang="en-us">
   <head>
      <meta charset="utf-8" />
      <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
      <title>Yetipang</title>
      <link rel="icon" type="image/png" href="favicon.png">
      <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"/>


      <link rel="stylesheet" href="Template/style.css" />
      
   </head>
   <body class="Dark">
      <!-- Ambiens VR Multiplatform WebGL Template v 1.3-->
      <!-- Unity Container -->
      <div id="main-container" class="fill-window">

         <div id="unity-container">
            <canvas id="unity-canvas"></canvas>
            <!-- Fullscreen toggle button (hidden) -->
            <!-- <div id="toggle_fullscreen" class="button floatbottomLeft fullscreenON" > <span class="imgbutton"></span> </div> -->
         </div>

         <!-- This is a simple progress bar -->
         <div id="loader" class="loader">
            <!-- 전체화면 타이틀 이미지 (비율 유지하면서 최대한 크게, 여백은 검은색) -->
            <img src="Template/title.png" class="fullscreen-title" />
            
            <div class="container progress-container">
               <div class="center">   
                  <div class="progressbar">
                     <div id="fill" class="fill" style="width: 0%;"></div>
                  </div>
               </div>
            </div>
            
            
            <div class="footer-cont">
               <p>Yetipang v. 1.21</p>
               <p>Le Space</p>
            </div>

         </div>

      </div>

      <!-- ===========================================
           [iOS 전용] 캡처 이미지 오버레이
           - 자동 캡처 + 서버 업로드 완료 시 ShowImageOverlay_iOS()로 표시
           - 사용자가 <img>를 길게 누르면 iOS 컨텍스트 메뉴 → "사진에 추가"
           - 결과창 닫힐 때 HideImageOverlay_iOS()로 숨김
      =========================================== -->
      <div id="ios-image-overlay" style="
           display: none;
           position: fixed;
           top: 0; left: 0;
           width: 100%; height: 100%;
           background: rgba(0, 0, 0, 0.85);
           z-index: 10000;
           flex-direction: column;
           justify-content: center;
           align-items: center;
           padding: 20px;
           box-sizing: border-box;
           -webkit-touch-callout: default;
           ">
         <img id="ios-image-overlay-img" src="" alt="result"
              style="
                  max-width: 100%;
                  max-height: 75%;
                  object-fit: contain;
                  border-radius: 8px;
                  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
                  -webkit-touch-callout: default;
                  -webkit-user-select: auto;
                  user-select: auto;
                  pointer-events: auto;
              "/>
         <p id="ios-image-overlay-guide"
            style="
                color: #fff;
                font-size: 16px;
                line-height: 1.5;
                margin-top: 24px;
                text-align: center;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                white-space: pre-line;
            "></p>
      </div>

      <script src="Template/app.js"> </script>

   </body>
</html>
